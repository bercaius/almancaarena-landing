<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almanca Arena — Admin Kontrol Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #06030c;
            --card-bg: rgba(15, 8, 30, 0.65);
            --color-gold: #dfba73;
            --color-gold-hover: #e6c88f;
            --primary-accent: #ff007f;
            --secondary-accent: #00f0ff;
            --text-light: #eceff1;
            --text-muted: #8c7e9c;
            --alert-red: #e53935;
            --alert-green: #4caf50;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                radial-gradient(circle at 5% 5%, rgba(223, 186, 115, 0.06) 0%, transparent 40%),
                radial-gradient(circle at 95% 95%, rgba(255, 0, 127, 0.06) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(10, 5, 21, 1) 0%, rgba(6, 3, 12, 1) 100%);
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            border: 1.5px solid rgba(223, 186, 115, 0.12);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 32px;
            padding: 35px;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8), 0 0 40px rgba(223, 186, 115, 0.03);
            text-align: center;
            transition: max-width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .container.panel-active {
            max-width: 1200px;
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 24px;
            background: linear-gradient(90deg, #fff 30%, var(--color-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 span {
            color: var(--color-gold);
            -webkit-text-fill-color: initial;
        }

        /* Responsive Grid for Admin Panel content */
        .admin-grid-layout {
            display: flex;
            flex-direction: column;
            gap: 30px;
            width: 100%;
            text-align: left;
            margin-top: 20px;
        }

        @media (min-width: 992px) {
            .admin-grid-layout {
                flex-direction: row;
                align-items: stretch;
            }
            .admin-col-settings {
                flex: 1;
                border-right: 1px solid rgba(255, 255, 255, 0.08);
                padding-right: 25px;
            }
            .admin-col-feedbacks {
                flex: 1.2;
                border-right: 1px solid rgba(255, 255, 255, 0.08);
                padding-right: 25px;
                padding-left: 10px;
            }
            .admin-col-tickets {
                flex: 1.5;
                padding-left: 10px;
            }
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 800;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="password"], textarea, select {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 12px 16px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        select option {
            background-color: var(--bg-color);
            color: #fff;
        }

        input[type="password"]:focus, textarea:focus, select:focus {
            border-color: var(--color-gold);
            box-shadow: 0 0 10px rgba(223, 186, 115, 0.15);
        }

        textarea {
            resize: none;
            height: 100px;
            font-size: 14px;
            line-height: 1.5;
        }

        .btn {
            background: transparent;
            border: 1.5px solid var(--color-gold);
            color: var(--color-gold);
            border-radius: 12px;
            padding: 12px;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
            width: 100%;
        }

        .btn:hover {
            background: var(--color-gold);
            color: #000;
            box-shadow: 0 0 15px rgba(223, 186, 115, 0.3);
            transform: translateY(-1px);
        }
        
        .btn-accent {
            border-color: var(--secondary-accent) !important;
            color: var(--secondary-accent) !important;
        }
        
        .btn-accent:hover {
            background: var(--secondary-accent) !important;
            color: #000 !important;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3) !important;
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Panel Content (Hidden initially) */
        #panel-content {
            display: none;
        }

        /* Switch toggle */
        .switch-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.3);
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .switch-label {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 28px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.15);
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--color-gold);
        }

        input:checked + .slider:before {
            transform: translateX(22px);
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 800;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .status-off {
            background: rgba(76, 175, 80, 0.15);
            color: var(--alert-green);
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        .status-on {
            background: rgba(229, 57, 53, 0.15);
            color: var(--alert-red);
            border: 1px solid rgba(229, 57, 53, 0.3);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(10, 5, 21, 0.95);
            border: 1.5px solid var(--color-gold);
            color: #fff;
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 700;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Mobile responsive admin tabs and overrides */
        .admin-mobile-tabs {
            display: none;
        }

        .google-logout-btn {
            background: transparent;
            border: 1px solid rgba(229, 57, 53, 0.3);
            color: #e53935;
            font-size: 11px;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .google-logout-btn:hover {
            background: rgba(229, 57, 53, 0.1);
            border-color: #e53935;
        }

        .tkt-tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 700;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tkt-tab-btn.active {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        @media (max-width: 991px) {
            .admin-mobile-tabs {
                display: flex !important;
                background: rgba(0, 0, 0, 0.2);
                border: 1px solid rgba(255, 255, 255, 0.05);
                border-radius: 12px;
                padding: 4px;
            }
            .admin-col-settings, .admin-col-feedbacks, .admin-col-tickets {
                display: none;
            }
            .admin-col-settings.active-tab, .admin-col-feedbacks.active-tab, .admin-col-tickets.active-tab {
                display: block !important;
            }
            .container {
                padding: 20px 15px !important;
                border-radius: 20px !important;
            }
            .container.panel-active {
                max-width: 100% !important;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ALMANCA <span>ARENA</span></h1>
        
        <!-- Login Form -->
        <div id="login-form">
            <h2 style="font-size: 18px; margin-bottom: 20px; font-weight: 600;">Admin Girişi</h2>
            <div class="form-group">
                <label for="pin">Yönetici PIN Kodu</label>
                <input type="password" id="pin" placeholder="••••••••" autofocus>
            </div>
            <button class="btn" onclick="checkPin()">Giriş Yap kanka</button>
            <div style="margin: 15px 0; font-size: 11px; color: var(--text-muted); font-weight: bold;">VEYA</div>
            <button class="btn" style="display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: bold; background: rgba(0, 240, 255, 0.04); border-color: var(--secondary-accent); color: var(--secondary-accent);" onclick="signInWithGoogleAdmin()">
              <img src="https://www.gstatic.com/images/branding/product/1x/gsa_android_64dp.png" alt="Google" style="width: 16px; height: 16px;">
              Google ile Giriş Yap 🚀
            </button>
        </div>

        <!-- Panel Controls -->
        <div id="panel-content">
            <!-- Admin Header Details (Profile name / Logout) -->
            <div id="admin-header-row" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1.5px solid rgba(223, 186, 115, 0.15); padding-bottom: 15px; margin-bottom: 25px;">
              <div id="admin-user-profile" style="text-align: left;">
                <!-- Dynamically loaded -->
              </div>
              <button class="google-logout-btn" onclick="signOutAdmin()">Güvenli Çıkış 👋</button>
            </div>

            <!-- Mobil Navigasyon Sekmesi (Sadece Mobilde Görünür) -->
            <div class="admin-mobile-tabs" style="margin-bottom: 25px; gap: 8px;">
                <button class="tkt-tab-btn active" id="btn-adm-settings" onclick="switchAdminTab('settings')">🛠️ Ayarlar</button>
                <button class="tkt-tab-btn" id="btn-adm-feedbacks" onclick="switchAdminTab('feedbacks')">💬 Yorumlar</button>
                <button class="tkt-tab-btn" id="btn-adm-tickets" onclick="switchAdminTab('tickets')">🎫 Destek</button>
            </div>

            <div class="admin-grid-layout">
                <!-- Column 1: Settings -->
                <div class="admin-col-settings">
                    <h3 style="font-size: 15px; font-weight: 800; color: var(--color-gold); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.5px;">🛠️ Sistem Ayarları</h3>
                    
                    <div id="status-display" class="status-badge status-off">Sistem Aktif (Bakım Kapalı)</div>
                    
                    <div class="switch-container">
                        <span class="switch-label">Bakım Modu</span>
                        <label class="switch">
                            <input type="checkbox" id="maintenance-toggle" onchange="toggleMaintenance(this.checked)">
                            <span class="slider"></span>
                        </label>
                    </div>

                    <!-- Geri Sayım Süre Seçici -->
                    <div class="form-group" id="duration-group">
                        <label for="duration-select">Bakım Süresi (Geri Sayım)</label>
                        <select id="duration-select">
                            <option value="0">Süre Belirtme (Sadece Bakım)</option>
                            <option value="15">15 Dakika</option>
                            <option value="30">30 Dakika</option>
                            <option value="60">1 Saat</option>
                            <option value="120">2 Saat</option>
                            <option value="300">5 Saat</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="msg">Bakım Mesajı</label>
                        <textarea id="msg" placeholder="Kullanıcılara gösterilecek bakım açıklamasını yazın..." style="height: 80px;"></textarea>
                    </div>

                    <button class="btn" style="background: var(--secondary-accent); color: #000;" onclick="saveConfig()">Ayarları Kaydet ⚡</button>
                </div>

                <!-- Column 2: Feedback & Opinions -->
                <div class="admin-col-feedbacks">
                    <h3 style="font-size: 15px; font-weight: 800; color: var(--secondary-accent); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.5px;">💬 Geri Bildirim & Yorumlar</h3>
                    <div id="admin-feedback-list" style="display: flex; flex-direction: column; gap: 12px; max-height: 450px; overflow-y: auto; padding-right: 5px;">
                        <div style="text-align: center; color: var(--text-muted); font-size: 13px; padding: 20px;">Yükleniyor...</div>
                    </div>
                </div>

                <!-- Column 3: Tickets & Live Support -->
                <div class="admin-col-tickets">
                    <h3 style="font-size: 15px; font-weight: 800; color: var(--secondary-accent); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.5px;">🎫 Özel Destek (Tickets)</h3>
                    
                    <div style="display: flex; flex-direction: column; gap: 15px;">
                        <!-- Ticket List -->
                        <div>
                            <h4 style="font-size: 11px; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px;">Gelen Destek Talepleri</h4>
                            <div id="admin-ticket-list" style="display: flex; flex-direction: column; gap: 10px; max-height: 200px; overflow-y: auto; padding-right: 5px; background: rgba(0,0,0,0.1); border-radius: 10px; padding: 10px; border: 1px solid rgba(255,255,255,0.03);">
                                <div style="text-align: center; color: var(--text-muted); font-size: 13px; padding: 20px;">Yükleniyor...</div>
                            </div>
                        </div>
                        
                        <!-- Ticket Chat Screen -->
                        <div id="admin-ticket-chat-panel" style="display: none; background: rgba(0,0,0,0.25); border: 1px solid rgba(223,186,115,0.15); padding: 15px; border-radius: 16px; box-shadow: 0 15px 30px rgba(0,0,0,0.4);">
                            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; margin-bottom: 12px;">
                                <strong id="adm-chat-title" style="color: #fff; font-size: 13px;">Sohbet Odası</strong>
                                <span id="adm-chat-status" class="status-badge status-on" style="font-size: 10px; padding: 2px 8px; border-radius: 6px; margin-bottom: 0;">AÇIK</span>
                            </div>
                            
                            <!-- Chat messages -->
                            <div id="adm-chat-messages" style="display: flex; flex-direction: column; gap: 10px; max-height: 200px; overflow-y: auto; padding-right: 5px; margin-bottom: 12px;">
                                <!-- Loaded dynamically -->
                            </div>
                            
                            <!-- Chat input -->
                            <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                                <input type="text" id="adm-chat-input" placeholder="Cevabınızı yazın kanka..." style="flex-grow: 1; font-size: 12px; padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); color: #fff; outline: none;">
                                <button class="btn" style="width: auto; margin-top: 0; padding: 8px 16px; font-size: 11px; font-weight: bold; background: var(--color-gold); color: #000; border-radius: 8px;" onclick="sendAdminTicketMessage()">Gönder</button>
                            </div>
                            
                            <!-- Status actions -->
                            <div style="display: flex; gap: 8px; justify-content: space-between;">
                                <div style="display: flex; gap: 6px;">
                                    <button class="btn" style="width: auto; margin-top: 0; padding: 6px 12px; font-size: 10px; font-weight: bold; background: var(--alert-green); color: #fff; border-radius: 6px; border: none;" onclick="updateTicketStatus('cevaplandı')">Cevaplandı</button>
                                    <button class="btn" style="width: auto; margin-top: 0; padding: 6px 12px; font-size: 10px; font-weight: bold; background: var(--text-muted); color: #fff; border-radius: 6px; border: none;" onclick="updateTicketStatus('kapatıldı')">Bileti Kapat</button>
                                </div>
                                <button class="btn" style="width: auto; margin-top: 0; padding: 6px 12px; font-size: 10px; font-weight: bold; background: var(--alert-red); color: #fff; border-radius: 6px; border: none;" onclick="deleteTicket()">Sil</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">Ayarlar kaydedildi!</div>

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBgP9Cr_XuIdcCx7RZykQNP9b93YuP1MYo",
            authDomain: "almanca-arena.firebaseapp.com",
            projectId: "almanca-arena",
            storageBucket: "almanca-arena.firebasestorage.app",
            messagingSenderId: "274345916793",
            appId: "1:274345916793:android:e69ae7186ab295603817a8"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Admin Config Document Reference
        const configRef = db.collection("system_config").doc("maintenance");

        let currentConfig = {
            isUnderMaintenance: false,
            maintenanceMessage: "Almanca Arena şu an planlı bakım çalışmasındadır. En kısa sürede döneceğiz!",
            endTimestamp: 0
        };

        // SHA-256 Hash Helper
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }

        let isAdminBypassed = sessionStorage.getItem('isAdminBypassed') === 'true';

        // Auth state listener for Admin
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                const allowedEmails = [
                    "turcodevelop@gmail.com",
                    "bercaiusozdemir@gmail.com",
                    "ayberk.dev@gmail.com",
                    "ayberk.ozdemir@gmail.com",
                    "ayberk@gmail.com"
                ];
                if (allowedEmails.includes(user.email.toLowerCase())) {
                    showAdminPanel(`🏢 ${user.displayName || 'Admin'}`, user.photoURL || '');
                } else {
                    showToast("Yetkisiz Google Hesabı! ❌");
                    firebase.auth().signOut();
                }
            } else if (isAdminBypassed) {
                showAdminPanel("🔑 Admin (PIN Girişi)", "");
            } else {
                document.getElementById("login-form").style.display = "block";
                document.getElementById("panel-content").style.display = "none";
                document.querySelector(".container").classList.remove("panel-active");
            }
        });

        function showAdminPanel(name, avatarUrl) {
            document.getElementById("login-form").style.display = "none";
            document.getElementById("panel-content").style.display = "block";
            document.querySelector(".container").classList.add("panel-active");
            
            const profileDiv = document.getElementById("admin-user-profile");
            if (profileDiv) {
                profileDiv.innerHTML = `
                  <div style="display: flex; align-items: center; gap: 10px;">
                    ${avatarUrl ? `<img src="${avatarUrl}" alt="Admin Avatar" style="width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--color-gold);">` : ''}
                    <div>
                      <div style="font-size: 13px; font-weight: 800; color: #fff;">${name}</div>
                      <div style="font-size: 10px; color: var(--text-muted);">Yönetici Paneli Aktif kanka ⚡</div>
                    </div>
                  </div>
                `;
            }

            if (window.innerWidth < 992) {
                switchAdminTab('settings');
            } else {
                document.querySelectorAll('.admin-col-settings, .admin-col-feedbacks, .admin-col-tickets').forEach(el => el.style.display = 'block');
            }

            loadCurrentConfig();
            listenToFeedbacks();
            listenToTickets();
        }

        // Check Admin PIN using SHA-256 Hash
        async function checkPin() {
            const pinVal = document.getElementById("pin").value;
            const hash = await sha256(pinVal);
            
            // a68e5cc2878cafd38c927705a3bc825bbb1031b3694e83bb6dfd573c7efa5d79 is the SHA-256 hash of "turco2026"
            if (hash === "a68e5cc2878cafd38c927705a3bc825bbb1031b3694e83bb6dfd573c7efa5d79") {
                sessionStorage.setItem('isAdminBypassed', 'true');
                isAdminBypassed = true;
                showAdminPanel("🔑 Admin (PIN Girişi)", "");
            } else {
                showToast("Hatalı PIN Kodu! ❌");
            }
        }

        function signInWithGoogleAdmin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).then((result) => {
                showToast("Google Girişi Başarılı! 🚀");
            }).catch((err) => {
                console.error("Admin Google login error:", err);
                showToast("Google Girişi Başarısız! ❌");
            });
        }

        function signOutAdmin() {
            sessionStorage.removeItem('isAdminBypassed');
            isAdminBypassed = false;
            firebase.auth().signOut().then(() => {
                location.reload();
            });
        }

        function switchAdminTab(tabName) {
            const cols = {
                settings: document.querySelector('.admin-col-settings'),
                feedbacks: document.querySelector('.admin-col-feedbacks'),
                tickets: document.querySelector('.admin-col-tickets')
            };
            const btns = {
                settings: document.getElementById('btn-adm-settings'),
                feedbacks: document.getElementById('btn-adm-feedbacks'),
                tickets: document.getElementById('btn-adm-tickets')
            };

            for (const key in cols) {
                if (cols[key]) {
                    if (key === tabName) {
                        cols[key].classList.add('active-tab');
                        if (btns[key]) btns[key].classList.add('active');
                        cols[key].style.display = 'block';
                    } else {
                        cols[key].classList.remove('active-tab');
                        if (btns[key]) btns[key].classList.remove('active');
                        cols[key].style.display = 'none';
                    }
                }
            }
        }

        // Handle Enter key on PIN input
        document.getElementById("pin").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                checkPin();
            }
        });

        let configListener = null;
        // Load current config from Firestore in real-time kanka!
        function loadCurrentConfig() {
            if (configListener) configListener(); // Unsubscribe first
            configListener = configRef.onSnapshot((doc) => {
                if (doc.exists) {
                    currentConfig = doc.data();
                    updateUiState();
                } else {
                    // Create default config if not exists
                    configRef.set(currentConfig);
                    updateUiState();
                }
            }, (error) => {
                console.error("Veri okuma hatası:", error);
                showToast("Hata: Firestore bağlantısı başarısız.");
            });
        }

        // Update UI components with current settings
        function updateUiState() {
            const toggle = document.getElementById("maintenance-toggle");
            const msgInput = document.getElementById("msg");
            const badge = document.getElementById("status-display");
            const durationSelect = document.getElementById("duration-select");
            const durationGroup = document.getElementById("duration-group");

            // Eğer bakım modu aktifse ancak bitiş zamanı girilmiş ve bu zaman geçmişte kalmışsa bakım modu kapanmıştır.
            let activeMaintenance = currentConfig.isUnderMaintenance;
            if (activeMaintenance && currentConfig.endTimestamp > 0 && currentConfig.endTimestamp <= Date.now()) {
                activeMaintenance = false;
                currentConfig.isUnderMaintenance = false;
                currentConfig.endTimestamp = 0;
                // Veritabanını otomatik olarak güncelle
                configRef.set(currentConfig).catch(err => console.error("Auto-disable maintenance failed:", err));
            }

            toggle.checked = activeMaintenance;
            msgInput.value = currentConfig.maintenanceMessage;

            if (activeMaintenance) {
                badge.innerText = "Sistem Bakımda 🛠️";
                badge.className = "status-badge status-on";
                durationGroup.style.display = "block";

                // Geri kalan dakikayı dropdown'da seç
                const remainingMin = Math.round((currentConfig.endTimestamp - Date.now()) / (60 * 1000));
                if (remainingMin > 0) {
                    let found = false;
                    for (let i = 0; i < durationSelect.options.length; i++) {
                        if (parseInt(durationSelect.options[i].value) === remainingMin) {
                            durationSelect.selectedIndex = i;
                            found = true;
                            break;
                        }
                    }
                    if (!found) {
                        const newOpt = document.createElement("option");
                        newOpt.value = remainingMin;
                        newOpt.text = `${remainingMin} Dakika`;
                        durationSelect.add(newOpt);
                        durationSelect.value = remainingMin;
                    }
                } else {
                    durationSelect.value = "0";
                }
            } else {
                badge.innerText = "Sistem Aktif (Bakım Kapalı) 🟢";
                badge.className = "status-badge status-off";
                durationGroup.style.display = "none";
                durationSelect.value = "0";
            }
        }


        // Handle toggle change locally
        function toggleMaintenance(isChecked) {
            currentConfig.isUnderMaintenance = isChecked;
            const badge = document.getElementById("status-display");
            const durationGroup = document.getElementById("duration-group");
            
            if (isChecked) {
                badge.innerText = "Sistem Bakımda 🛠️";
                badge.className = "status-badge status-on";
                durationGroup.style.display = "block";
            } else {
                badge.innerText = "Sistem Aktif (Bakım Kapalı) 🟢";
                badge.className = "status-badge status-off";
                durationGroup.style.display = "none";
                document.getElementById("duration-select").value = "0";
                currentConfig.endTimestamp = 0;
            }
        }

        // Save updated settings to Firestore
        function saveConfig() {
            currentConfig.maintenanceMessage = document.getElementById("msg").value;
            const durationVal = parseInt(document.getElementById("duration-select").value);
            
            if (currentConfig.isUnderMaintenance) {
                if (durationVal > 0) {
                    currentConfig.endTimestamp = Date.now() + (durationVal * 60 * 1000);
                } else {
                    currentConfig.endTimestamp = 0; // Permanent maintenance until disabled
                }
            } else {
                currentConfig.endTimestamp = 0;
            }
            
            configRef.set(currentConfig)
                .then(() => {
                    showToast("Ayarlar online olarak kaydedildi! ⚡");
                    updateUiState();
                })
                .catch((error) => {
                    console.error("Kaydetme hatası:", error);
                    showToast("Kaydedilemedi! İzin hatası olabilir. ❌");
                });
        }


        // Toast message helper
        function showToast(text) {
            const toast = document.getElementById("toast");
            toast.innerText = text;
            toast.classList.add("show");
            setTimeout(() => {
                toast.classList.remove("show");
            }, 3000);
        }

        // --- Feedbacks & Opinions Live Listener ---
        function listenToFeedbacks() {
            db.collection("feedbacks").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
                const list = document.getElementById("admin-feedback-list");
                if (!list) return;
                list.innerHTML = "";
                if (snapshot.empty) {
                    list.innerHTML = `<div style="text-align: center; color: var(--text-muted); font-size: 13px; padding: 20px;">Henüz hiç yorum yapılmamış kanka.</div>`;
                    return;
                }

                // Client-side sorting: Pinned first
                const items = [];
                snapshot.forEach((doc) => {
                    items.push({ id: doc.id, ...doc.data() });
                });

                items.sort((a, b) => {
                    const aPinned = a.pinned === true;
                    const bPinned = b.pinned === true;
                    if (aPinned && !bPinned) return -1;
                    if (!aPinned && bPinned) return 1;
                    return (b.timestamp || 0) - (a.timestamp || 0);
                });

                items.forEach((data) => {
                    const docId = data.id;
                    const card = document.createElement("div");
                    card.style.background = "rgba(0,0,0,0.2)";
                    card.style.border = data.pinned ? "1.5px solid var(--color-gold)" : "1px solid rgba(255,255,255,0.08)";
                    card.style.borderRadius = "12px";
                    card.style.padding = "12px";
                    card.style.marginBottom = "10px";
                    card.style.textAlign = "left";

                    let catText = "Teşekkür";
                    let catColor = "var(--alert-green)";
                    if (data.category === "bug") {
                        catText = "Hata Bildirimi";
                        catColor = "var(--alert-red)";
                    } else if (data.category === "suggestion") {
                        catText = "Öneri";
                        catColor = "var(--secondary-accent)";
                    }

                    let pinButtonText = data.pinned ? "📌 Sabiti Kaldır" : "📌 Sabitle";

                    let replyActionsHtml = "";
                    if (data.reply) {
                        replyActionsHtml = `
                            <div style="display: flex; gap: 6px; margin-top: 4px;">
                                <button class="btn" style="width: auto; margin-top: 0; padding: 3px 8px; font-size: 10px; background: rgba(255,255,255,0.05); color: #fff; border-radius: 4px;" onclick="editAdminReply('${docId}', '${escapeJsString(data.reply)}')">Cevabı Düzenle</button>
                                <button class="btn" style="width: auto; margin-top: 0; padding: 3px 8px; font-size: 10px; background: rgba(229, 57, 53, 0.15); color: #e53935; border-radius: 4px;" onclick="deleteAdminReply('${docId}')">Cevabı Sil</button>
                            </div>
                        `;
                    }

                    card.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                            <strong style="color: #fff; font-size: 13px;">
                                ${escapeHtml(data.userName)} 
                                ${data.pinned ? '<span style="font-size: 10px; color: var(--color-gold); background: rgba(212,175,55,0.1); padding: 1px 4px; border-radius: 4px; margin-left: 6px;">Sabitlendi</span>' : ''}
                            </strong>
                            <span style="font-size: 10px; color: ${catColor}; font-weight: bold;">${catText}</span>
                        </div>
                        <p style="color: var(--text-muted); font-size: 12px; margin-bottom: 8px; line-height: 1.4;">${escapeHtml(data.comment)}</p>
                        
                        ${data.reply ? `
                        <div style="background: rgba(212,175,55,0.05); border-left: 2px solid var(--color-gold); padding: 6px 10px; border-radius: 4px; font-size: 11px; margin-bottom: 8px; color: var(--text-light);">
                            <strong>🏢 TurcoDevelop Cevabı:</strong> ${escapeHtml(data.reply)}
                            ${replyActionsHtml}
                        </div>
                        ` : ''}

                        <div style="display: flex; gap: 8px; margin-top: 8px; align-items: center;">
                            <input type="text" id="reply-input-${docId}" placeholder="Cevabınızı yazın..." style="flex-grow: 1; font-size: 12px; padding: 6px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: #fff; outline: none;">
                            <button class="btn" style="width: auto; margin-top: 0; padding: 6px 12px; font-size: 11px; font-weight: bold; background: var(--secondary-accent); color: #000; border-radius: 6px;" onclick="submitAdminReply('${docId}')">Cevapla</button>
                            <button class="btn" style="width: auto; margin-top: 0; padding: 6px 12px; font-size: 11px; font-weight: bold; background: rgba(255,255,255,0.05); color: #fff; border-radius: 6px;" onclick="togglePinFeedback('${docId}', ${data.pinned === true})">${pinButtonText}</button>
                            <button class="btn" style="width: auto; margin-top: 0; padding: 6px 12px; font-size: 11px; font-weight: bold; background: var(--alert-red); color: #fff; border-radius: 6px;" onclick="deleteFeedback('${docId}')">Sil</button>
                        </div>
                    `;
                    list.appendChild(card);
                });
            }, (error) => {
                console.error("Geri bildirimleri alma hatası:", error);
            });
        }

        function escapeHtml(text) {
            if (!text) return "";
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function escapeJsString(text) {
            if (!text) return "";
            return text
                .replace(/'/g, "\\'")
                .replace(/"/g, '\\"');
        }

        function submitAdminReply(docId) {
            const input = document.getElementById(`reply-input-${docId}`);
            const replyText = input.value.trim();
            if (!replyText) {
                showToast("Lütfen bir yanıt yaz kanka! 🐾");
                return;
            }
            db.collection("feedbacks").doc(docId).update({
                reply: replyText,
                replyTimestamp: Date.now()
            }).then(() => {
                showToast("Yanıt online olarak kaydedildi! ⚡");
                input.value = "";
            }).catch((error) => {
                console.error("Yorum yanıtlama hatası:", error);
                showToast("Yanıt gönderilemedi! ❌");
            });
        }

        function editAdminReply(docId, oldReply) {
            const input = document.getElementById(`reply-input-${docId}`);
            if (input) {
                input.value = oldReply;
                input.focus();
            }
        }

        function deleteAdminReply(docId) {
            if (!confirm("Bu cevabı silmek istediğine emin misin kanka? 🐾")) return;
            db.collection("feedbacks").doc(docId).update({
                reply: "",
                replyTimestamp: 0
            }).then(() => {
                showToast("Cevabınız silindi! 🗑️");
            }).catch((error) => {
                console.error("Cevap silme hatası:", error);
                showToast("Cevap silinemedi! ❌");
            });
        }

        function deleteFeedback(docId) {
            if (!confirm("Bu yorumu silmek istediğine emin misin kanka? 🐾")) return;
            db.collection("feedbacks").doc(docId).delete().then(() => {
                showToast("Yorum silindi! 🗑️");
            }).catch((error) => {
                console.error("Yorum silme hatası:", error);
                showToast("Silinemedi! ❌");
            });
        }

        function togglePinFeedback(docId, currentPinned) {
            db.collection("feedbacks").doc(docId).update({
                pinned: !currentPinned
            }).then(() => {
                showToast(currentPinned ? "Sabit kaldırıldı! 📌" : "Yorum sabitlendi! 📌");
            }).catch((error) => {
                console.error("Sabitleme hatası:", error);
                showToast("İşlem başarısız! ❌");
            });
        }

        // --- TICKETS SYSTEM (Yönetici) ---
        let activeAdminTicketId = null;
        let adminTicketListener = null;

        function listenToTickets() {
            db.collection("tickets").orderBy("lastUpdated", "desc").onSnapshot((snapshot) => {
                const list = document.getElementById("admin-ticket-list");
                if (!list) return;
                list.innerHTML = "";
                if (snapshot.empty) {
                    list.innerHTML = `<div style="text-align: center; color: var(--text-muted); font-size: 13px; padding: 20px;">Henüz hiç destek talebi açılmamış kanka.</div>`;
                    return;
                }

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const docId = doc.id;
                    const card = document.createElement("div");
                    card.style.background = "rgba(0,0,0,0.2)";
                    card.style.border = activeAdminTicketId === docId ? "1.5px solid var(--color-gold)" : "1px solid rgba(255,255,255,0.08)";
                    card.style.borderRadius = "10px";
                    card.style.padding = "10px";
                    card.style.cursor = "pointer";
                    card.style.textAlign = "left";
                    card.onclick = () => openAdminTicketChat(docId);

                    const statusColor = data.status === 'açık' ? 'var(--alert-red)' : 'var(--alert-green)';

                    card.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                            <strong style="color: #fff; font-size: 12px;">${escapeHtml(data.userName)} (${escapeHtml(data.ticketId)})</strong>
                            <span style="font-size: 9px; color: ${statusColor}; font-weight: bold; text-transform: uppercase;">${data.status}</span>
                        </div>
                        <div style="font-size: 11px; color: var(--secondary-accent); font-weight: 700; margin-bottom: 2px;">Konu: ${escapeHtml(data.subject)}</div>
                        <div style="font-size: 10px; color: var(--text-muted);">E-posta: ${escapeHtml(data.email)}</div>
                    `;
                    list.appendChild(card);
                });
            }, (error) => {
                console.error("Bilet dinleme hatası:", error);
            });
        }

        function openAdminTicketChat(ticketId) {
            activeAdminTicketId = ticketId;
            document.getElementById("admin-ticket-chat-panel").style.display = "block";
            
            // Re-render ticket list border highlights
            listenToTickets();

            if (adminTicketListener) adminTicketListener(); // Unsubscribe first

            adminTicketListener = db.collection("tickets").doc(ticketId).onSnapshot((doc) => {
                if (!doc.exists) {
                    document.getElementById("admin-ticket-chat-panel").style.display = "none";
                    return;
                }
                const data = doc.data();

                document.getElementById("adm-chat-title").innerText = `${escapeHtml(data.userName)} - ${escapeHtml(data.subject)} (${data.ticketId})`;
                const statusBadge = document.getElementById("adm-chat-status");
                statusBadge.innerText = data.status.toUpperCase();
                statusBadge.className = `status-badge status-${data.status === 'açık' ? 'on' : 'off'}`;

                const chatMessagesList = document.getElementById("adm-chat-messages");
                chatMessagesList.innerHTML = "";

                (data.messages || []).forEach((msg) => {
                    const msgDiv = document.createElement("div");
                    const isStudio = msg.sender === "TurcoDevelop";
                    msgDiv.style.padding = "8px 10px";
                    msgDiv.style.borderRadius = "10px";
                    msgDiv.style.fontSize = "11px";
                    msgDiv.style.lineHeight = "1.4";
                    msgDiv.style.maxWidth = "80%";
                    msgDiv.style.marginBottom = "6px";
                    
                    if (isStudio) {
                        msgDiv.style.background = "rgba(212, 175, 55, 0.08)";
                        msgDiv.style.border = "1px solid rgba(212, 175, 55, 0.2)";
                        msgDiv.style.alignSelf = "flex-end";
                        msgDiv.style.marginLeft = "auto";
                    } else {
                        msgDiv.style.background = "rgba(255, 255, 255, 0.04)";
                        msgDiv.style.border = "1px solid rgba(255, 255, 255, 0.08)";
                        msgDiv.style.alignSelf = "flex-start";
                    }

                    const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    msgDiv.innerHTML = `
                        <div style="font-weight: bold; font-size: 9px; color: ${isStudio ? 'var(--color-gold)' : '#fff'}; margin-bottom: 2px;">
                            ${isStudio ? '🏢 TurcoDevelop' : escapeHtml(data.userName)}
                        </div>
                        <div style="color: #fff;">${escapeHtml(msg.text)}</div>
                        <div style="font-size: 8px; color: var(--text-muted); text-align: right; margin-top: 3px;">${time}</div>
                    `;
                    chatMessagesList.appendChild(msgDiv);
                });

                chatMessagesList.scrollTop = chatMessagesList.scrollHeight;
            });
        }

        function sendAdminTicketMessage() {
            const input = document.getElementById("adm-chat-input");
            const text = input.value.trim();
            if (!text || !activeAdminTicketId) return;

            const now = Date.now();
            db.collection("tickets").doc(activeAdminTicketId).update({
                messages: firebase.firestore.FieldValue.arrayUnion({
                    sender: "TurcoDevelop",
                    text: text,
                    timestamp: now
                }),
                lastUpdated: now,
                status: "cevaplandı" // Set status to answered when admin replies
            }).then(() => {
                input.value = "";
            }).catch((err) => {
                console.error("Bilet mesajı gönderme hatası:", err);
                showToast("Mesaj gönderilemedi! ❌");
            });
        }

        function updateTicketStatus(status) {
            if (!activeAdminTicketId) return;
            db.collection("tickets").doc(activeAdminTicketId).update({
                status: status,
                lastUpdated: Date.now()
            }).then(() => {
                showToast(`Talep durumu '${status.toUpperCase()}' olarak güncellendi! ⚡`);
            }).catch((err) => {
                console.error("Durum güncelleme hatası:", err);
                showToast("Durum güncellenemedi! ❌");
            });
        }

        function deleteTicket() {
            if (!activeAdminTicketId) return;
            if (!confirm("Bu destek talebini tamamen silmek istediğine emin misin kanka? 🐾")) return;
            db.collection("tickets").doc(activeAdminTicketId).delete().then(() => {
                showToast("Destek talebi tamamen silindi! 🗑️");
                activeAdminTicketId = null;
                document.getElementById("admin-ticket-chat-panel").style.display = "none";
                listenToTickets();
            }).catch((err) => {
                console.error("Bilet silme hatası:", err);
                showToast("Silme başarısız! ❌");
            });
        }

        // Window resize event handler for column layouts
        window.addEventListener('resize', () => {
            if (window.innerWidth >= 992) {
                document.querySelectorAll('.admin-col-settings, .admin-col-feedbacks, .admin-col-tickets').forEach(el => el.style.display = 'block');
            } else {
                const activeTabBtn = document.querySelector('.admin-mobile-tabs .tkt-tab-btn.active');
                if (activeTabBtn) {
                    const tabName = activeTabBtn.id.replace('btn-adm-', '');
                    switchAdminTab(tabName);
                }
            }
        });
    </script>
</body>
</html>
